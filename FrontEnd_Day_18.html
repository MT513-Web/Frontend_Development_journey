<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day 18 Testing jQuery & AJAX</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <style>
        body { font-family: Arial; margin: 30px; background: #f4f4f4; }
        .box { width: 200px; padding: 20px; background: lightcoral; color: white; text-align: center; cursor: pointer; padding: 10px; }
        .my-input { padding: 8px; width: 200px; }
        .btn { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Day 18: Testing jQuery & AJAX</h1>
    <hr>

    <p style="background: lightyellow; padding: 10px; cursor: pointer;">This is a paragraph. Click to hide!</p>
    <h3 id="main-title" style="color: darkblue; cursor: pointer;">Double click this title!</h3>
    <div class="box">Bring mouse inside!</div>
    <p><input type="text" class="my-input" placeholder="Click here..."></p>
    <button class="btn">Hover & Click Me</button>

    <script src="script_day18.js"></script>
</body>
</html>
